<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSONPlaceholder Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="jsonplaceholder.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Welcome to data explorer </h1>
            <p>explore posts,comments,albums,photos,todos,users</p>
            <nav class="resource-nav">
                <button class="nav-btn active" data-resource="posts">Posts</button>
                <button class="nav-btn" data-resource="comments">Comments</button>
                <button class="nav-btn" data-resource="albums">Albums</button>
                <button class="nav-btn" data-resource="photos">Photos</button>
                <button class="nav-btn" data-resource="todos">Todos</button>
                <button class="nav-btn" data-resource="users">Users</button>
            </nav>
        </header>

        <main>
            <div id="loader" class="loader hidden"></div>
            <div id="error" class="error-msg hidden"></div>
            <div id="content-grid" class="grid-container">
            </div>
        </main>
    </div>
    <script src="jsonplaceholder.js"></script>
</body>

</html>
