<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Profile Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="github.css" />
</head>

<body>
    <header class="header">
        <h1>GitHub Finder</h1>
        <p>Explore any GitHub profile instantly</p>
    </header>

    <main class="container">
        <section class="search-section">
            <form id="searchForm" class="search-form">
                <input type="text" id="usernameInput" placeholder="Enter GitHub username..." autocomplete="off" />
                <button type="submit" class="btn">Search</button>
            </form>
            <p id="searchError" class="error-text hidden"></p>
        </section>

        <div id="loadingState" class="state-message hidden">Loading profile...</div>
        <div id="errorState" class="state-message error-text hidden"></div>

        <section id="profileCard" class="profile-card hidden">
            <div class="profile-header">
                <img id="avatarImg" src="" alt="Avatar" class="avatar" />
                <div class="profile-info">
                    <h2 id="profileName"></h2>
                    <a id="profileLogin" href="#" target="_blank" class="username-link"></a>
                    <p id="profileBio" class="bio"></p>
                    <a id="githubLink" href="#" target="_blank" class="btn">View on GitHub</a>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat"><strong id="statRepos">0</strong> <span>Repos</span></div>
                <div class="stat"><strong id="statFollowers">0</strong> <span>Followers</span></div>
                <div class="stat"><strong id="statFollowing">0</strong> <span>Following</span></div>
                <div class="stat"><strong id="statGists">0</strong> <span>Gists</span></div>
            </div>

            <h3 class="section-title">Top Repositories</h3>
            <div id="reposList" class="repos-grid"></div>
        </section>
    </main>

    <script src="github.js"></script>
</body>

</html>
