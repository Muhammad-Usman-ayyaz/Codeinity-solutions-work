<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosphere - Minimal Weather</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="weathercss.css">
</head>

<body class="theme-default">
    <div class="app_container">
        <header class="header">
            <div class="searchbar">
                <input type="text" id="cityInput" class="searchbar" placeholder="Enter city name..." autocomplete="off">
                <button id="searchbtn" class="searchbtn">Search</button>
                <button id="geobtn" class="geobtn">Current Location</button>
            </div>
            <div class="unit-toggle">
                <button id="unitC" class="unitbtn active">°C</button>
                <button id="unitF" class="unitbtn">°F</button>


            </div>
            <div id="recentSearches" class="recent-searches hidden">
                <span>Recenets:</span>
                <span id="searches"></span>
            </div>
            <div class="search-status">
                <div id="errormsg" class="error hidden">
                    <span id="errortxt">City not found or check your internet connection 🤣</span>
                </div>


            </div>
            <div id="loadingMsg" class="loading hidden">
                <div class="spinner"></div>
                <span id="loadingTxt">Loading weather data...</span>
            </div>



        </header>
    </div>

    <script src="script.js"></script>
</body>

</html>
