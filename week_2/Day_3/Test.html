<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .radio-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid #767676;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 4px;

        }

        .radio-checkbox:checked {
            border-color: #0075ff;
            background: radial-gradient(circle, #0075ff 55%, transparent 43%);
        }

        label {
            vertical-align: middle;
            font-family: sans-serif;
        }
    </style>


</head>

</body>

</html>
